# Remap prefix to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal settings
set -g default-terminal "screen-256color"
set -g mouse on
set -g history-limit 100000

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Split panes
bind-key v split-window -h -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"

# Detach/join panes
bind-key ! break-pane -d
bind-key @ choose-window "join-pane -h -s '%%' -t :.+"

# Alt-arrow pane navigation (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane title
bind-key T command-prompt -p "New pane title:" "select-pane -T '%%'"

# Pane borders
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour4
set -g pane-border-lines heavy
set -g pane-border-indicators both

# Window auto-rename
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format "#{pane_current_command}"
set -g renumber-windows on

# Status bar
set -g status-fg green
set -g status-bg black

# Vi copy mode — tmux-yank plugin handles cross-platform clipboard automatically
# (pbcopy on macOS, xclip/xsel on X11 Linux, wl-copy on Wayland)
setw -g mode-keys vi
set -g @yank_action 'copy-pipe-and-cancel'

# Mouse drag select copies to clipboard (via tmux-yank)
set -g @yank_with_mouse on

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Reduce escape delay
set -sg escape-time 0

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'

# Theme
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme 'moon'
set -g @tmux_power_show_user false
set -g @tmux_power_show_host false
set -g @tmux_power_show_session false

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
